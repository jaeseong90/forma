<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMA - 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            padding: 48px 40px;
            width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a73e8;
            letter-spacing: -0.5px;
        }
        .login-logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        .login-btn:hover { background: #1557b0; }
        .login-btn:active { background: #104a9e; }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .save-id {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }
        .save-id label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }
        .dev-info {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-logo">
        <h1>FORMA</h1>
        <p>ERP Framework</p>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-group">
        <label for="userId">사용자 ID</label>
        <input type="text" id="userId" placeholder="사용자 ID를 입력하세요" autocomplete="username">
    </div>

    <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    </div>

    <div class="save-id">
        <input type="checkbox" id="saveId">
        <label for="saveId">아이디 저장</label>
    </div>

    <button class="login-btn" id="loginBtn">로그인</button>

    <div class="dev-info">
        개발 모드: admin / kim / lee / park (비밀번호 없음)
    </div>
</div>

<script>
(function() {
    var userIdEl = document.getElementById('userId');
    var passwordEl = document.getElementById('password');
    var loginBtn = document.getElementById('loginBtn');
    var saveIdEl = document.getElementById('saveId');
    var errorEl = document.getElementById('error-msg');

    // URL 파라미터 에러 메시지 표시
    var urlParams = new URLSearchParams(window.location.search);
    var error = urlParams.get('error');
    if (error === 'token_missing') showError('로그인이 필요합니다.');
    else if (error === 'token_expired') showError('세션이 만료되었습니다. 다시 로그인해주세요.');

    // 저장된 아이디 복원
    var savedId = localStorage.getItem('forma_saved_id');
    if (savedId) {
        userIdEl.value = savedId;
        saveIdEl.checked = true;
        passwordEl.focus();
    } else {
        userIdEl.focus();
    }

    // 로그인 처리
    function doLogin() {
        var userId = userIdEl.value.trim();
        var password = passwordEl.value;

        if (!userId) { showError('사용자 ID를 입력하세요.'); userIdEl.focus(); return; }

        loginBtn.disabled = true;
        loginBtn.textContent = '로그인 중...';

        fetch('/login/loginProcess', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: userId, password: password })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.resultCode === 'OK') {
                // 아이디 저장
                if (saveIdEl.checked) localStorage.setItem('forma_saved_id', userId);
                else localStorage.removeItem('forma_saved_id');
                // 메인 페이지 이동
                location.href = '/';
            } else {
                showError(data.resultMessage || '로그인에 실패했습니다.');
                passwordEl.value = '';
                passwordEl.focus();
            }
        })
        .catch(function() {
            showError('서버에 연결할 수 없습니다.');
        })
        .finally(function() {
            loginBtn.disabled = false;
            loginBtn.textContent = '로그인';
        });
    }

    loginBtn.addEventListener('click', doLogin);

    // 엔터 키 로그인
    userIdEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') passwordEl.focus(); });
    passwordEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
    }
})();
</script>
</body>
</html>
