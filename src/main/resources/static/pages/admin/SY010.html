<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메뉴관리</title>
    <link rel="stylesheet" href="/assets/css/forma.css">
    <style>
        .menu-tree { padding: 4px; font-size: 12px; }
        .menu-tree ul { list-style: none; padding-left: 16px; margin: 0; }
        .menu-tree > ul { padding-left: 0; }
        .menu-tree li { padding: 0; }
        .menu-tree-item {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 6px; cursor: pointer; border-radius: 3px;
            border-left: 3px solid transparent;
        }
        .menu-tree-item:hover { background: var(--bg-hover); }
        .menu-tree-item.selected { background: var(--bg-selected); border-left-color: var(--primary); font-weight: 600; }
        .menu-tree-item .toggle { width: 14px; text-align: center; font-size: 9px; color: #888; cursor: pointer; }
        .menu-tree-item .icon { font-size: 13px; }
        .menu-tree-item .label { flex: 1; }
        .menu-tree-item .id-badge { font-size: 10px; color: #999; }
        .menu-tree-item .type-badge { font-size: 9px; padding: 1px 4px; border-radius: 2px; }
        .menu-tree-item .type-badge.group { background: #e0f2fe; color: #0284c7; }
        .menu-tree-item .type-badge.page { background: #f0fdf4; color: #16a34a; }
    </style>
</head>
<body>
<div class="forma-page">
    <div class="forma-page-header">
        <h1 class="forma-page-title">메뉴관리 (SY010)</h1>
        <div id="toolbar-SY010"></div>
    </div>
    <div class="forma-content">
        <div class="forma-split-h" id="split-SY010" style="min-height:500px;">
            <div class="forma-split-panel" style="width:320px;">
                <div class="forma-section" style="height:100%;overflow:auto;">
                    <div class="forma-section-title" style="display:flex;justify-content:space-between;align-items:center;">
                        메뉴 트리
                        <button type="button" class="forma-btn" style="font-size:11px;height:22px;padding:0 8px;" onclick="document.dispatchEvent(new CustomEvent('sy010-add-root'))">+ 최상위 그룹</button>
                    </div>
                    <div style="font-size:11px;color:#888;margin-bottom:6px;">메뉴 우클릭 → 하위 추가/이동/삭제</div>
                    <div id="menu-tree-SY010" class="menu-tree"></div>
                </div>
            </div>
            <div class="forma-split-handle"></div>
            <div class="forma-split-panel" style="flex:1;">
                <div class="forma-section">
                    <div class="forma-section-title" id="detail-title-SY010">메뉴 상세 (메뉴를 선택하세요)</div>
                    <div id="menu-form-SY010"></div>
                </div>
                <div class="forma-section" style="margin-top:8px;">
                    <div class="forma-section-title">하위 메뉴</div>
                    <div id="child-grid-SY010"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/assets/js/framework/forma.core.js"></script>
<script src="/assets/js/framework/forma.popup.js"></script>
<script src="/assets/js/framework/forma.util.js"></script>
<script src="/assets/js/framework/forma.grid.js"></script>
<script src="/assets/js/framework/forma.form.js"></script>
<script src="/assets/js/framework/forma.toolbar.js"></script>
<script src="/assets/js/framework/forma.tab.js"></script>
<script src="/assets/js/framework/forma.modal.js"></script>
<script>
(async function() {
    var PGM = 'SY010';
    var S = PGM;
    var listener = platform.initListener(PGM);
    var ctx = { allMenus: [], selectedMenu: null, groupOptions: [] };

    // Init
    try {
        var res = await platform.get('/api/pgm/' + PGM + '/init');
        if (res.resultCode === 'OK') { listener.pgmInfo = res.resultData.pgmInfo; listener.pgmAuth = res.resultData.pgmAuth; }
    } catch(e) { listener.pgmInfo = {}; listener.pgmAuth = {}; }
    if (typeof FormaToolbar !== 'undefined') {
        FormaToolbar.render('#toolbar-' + S, { listener: listener, pgmInfo: listener.pgmInfo, pgmAuth: listener.pgmAuth });
    }

    FormaUtil.initSplit('#split-' + S);

    // 상세 폼
    ctx.menuForm = new FormaForm('#menu-form-' + S, {
        columns: 2, labelWidth: 90,
        elements: [
            { field: 'menu_id', label: '메뉴ID', required: true },
            { field: 'menu_nm', label: '메뉴명', required: true },
            { field: 'parent_id', label: '상위메뉴', widget: 'combo', options: [] },
            { field: 'menu_type', label: '유형', widget: 'combo',
              options: [{ value: 'G', label: '그룹' }, { value: 'P', label: '화면' }] },
            { field: 'pgm_id', label: '프로그램', widget: 'codePopup',
              popup: { url: '/pages/popup/PGM_P01.html', codeField: 'PGM_ID', nameField: 'PGM_NM', width: 600, height: 400 } },
            { field: 'url', label: 'URL' },
            { field: 'icon', label: '아이콘' },
            { field: 'sort_order', label: '정렬순서', widget: 'number' },
            { field: 'use_yn', label: '사용', widget: 'combo',
              options: [{ value: 'Y', label: '사용' }, { value: 'N', label: '미사용' }] }
        ]
    });

    // 하위 메뉴 그리드 (읽기 전용, 정렬 확인용)
    ctx.childGrid = new FormaGrid('#child-grid-' + S, {
        sortable: true,
        columns: [
            { field: 'MENU_ID', label: '메뉴ID', width: 80 },
            { field: 'MENU_NM', label: '메뉴명', width: 150 },
            { field: 'MENU_TYPE', label: '유형', width: 50, align: 'center',
              renderer: function(v) { return v === 'G' ? '그룹' : '화면'; } },
            { field: 'PGM_ID', label: '프로그램', width: 80 },
            { field: 'SORT_ORDER', label: '정렬', width: 50, type: 'number', align: 'center' },
            { field: 'USE_YN', label: '사용', width: 40, align: 'center' }
        ],
        onRowClick: function(row) { selectMenu(row.MENU_ID); }
    });

    // ═══ 트리 렌더링 ═══
    function buildTree(menus) {
        var map = {};
        var roots = [];
        menus.forEach(function(m) { map[m.MENU_ID] = { data: m, children: [] }; });
        menus.forEach(function(m) {
            if (m.PARENT_ID && map[m.PARENT_ID]) {
                map[m.PARENT_ID].children.push(map[m.MENU_ID]);
            } else {
                roots.push(map[m.MENU_ID]);
            }
        });
        return roots;
    }

    function renderTree(nodes, container) {
        container.innerHTML = '';
        var ul = document.createElement('ul');
        nodes.forEach(function(node) { ul.appendChild(renderNode(node)); });
        container.appendChild(ul);
    }

    function renderNode(node) {
        var m = node.data;
        var li = document.createElement('li');

        var div = document.createElement('div');
        div.className = 'menu-tree-item';
        div.dataset.menuId = m.MENU_ID;

        // 토글
        var toggle = document.createElement('span');
        toggle.className = 'toggle';
        if (node.children.length > 0) {
            toggle.textContent = '\u25BC';
            toggle.onclick = function(e) {
                e.stopPropagation();
                var sub = li.querySelector('ul');
                if (sub) {
                    var open = sub.style.display !== 'none';
                    sub.style.display = open ? 'none' : '';
                    toggle.textContent = open ? '\u25B6' : '\u25BC';
                }
            };
        }
        div.appendChild(toggle);

        // 아이콘
        if (m.ICON) {
            var icon = document.createElement('span');
            icon.className = 'icon';
            icon.textContent = m.ICON;
            div.appendChild(icon);
        }

        // 라벨
        var label = document.createElement('span');
        label.className = 'label';
        label.textContent = m.MENU_NM;
        div.appendChild(label);

        // 유형 뱃지
        var badge = document.createElement('span');
        badge.className = 'type-badge ' + (m.MENU_TYPE === 'G' ? 'group' : 'page');
        badge.textContent = m.MENU_TYPE === 'G' ? '그룹' : '화면';
        div.appendChild(badge);

        // ID
        var idBadge = document.createElement('span');
        idBadge.className = 'id-badge';
        idBadge.textContent = m.MENU_ID;
        div.appendChild(idBadge);

        // 클릭
        div.onclick = function() { selectMenu(m.MENU_ID); };

        // 우클릭 → 컨텍스트 메뉴
        div.oncontextmenu = function(e) {
            e.preventDefault();
            selectMenu(m.MENU_ID);
            showTreeContextMenu(e, m);
        };

        li.appendChild(div);

        // 하위
        if (node.children.length > 0) {
            var sub = document.createElement('ul');
            node.children.forEach(function(child) { sub.appendChild(renderNode(child)); });
            li.appendChild(sub);
        }

        return li;
    }

    function selectMenu(menuId) {
        ctx.selectedMenu = ctx.allMenus.find(function(m) { return m.MENU_ID === menuId; });
        if (!ctx.selectedMenu) return;

        var m = ctx.selectedMenu;
        document.getElementById('detail-title-' + S).textContent = m.MENU_NM + ' (' + m.MENU_ID + ')';

        // 폼에 데이터 세팅 (키를 소문자로 변환)
        ctx.menuForm.setData({
            menu_id: m.MENU_ID, menu_nm: m.MENU_NM, parent_id: m.PARENT_ID || '',
            menu_type: m.MENU_TYPE, pgm_id: m.PGM_ID || '', url: m.URL || '',
            icon: m.ICON || '', sort_order: m.SORT_ORDER, use_yn: m.USE_YN
        });
        ctx.menuForm.setReadonly('menu_id', true);
        ctx._isNew = false;

        // 하위 메뉴 표시
        var children = ctx.allMenus.filter(function(c) { return c.PARENT_ID === menuId; });
        ctx.childGrid.setData(children);

        // 트리 하이라이트
        var items = document.querySelectorAll('#menu-tree-' + S + ' .menu-tree-item');
        items.forEach(function(el) { el.classList.toggle('selected', el.dataset.menuId === menuId); });
    }

    // ═══ 우클릭 컨텍스트 메뉴 ═══
    function showTreeContextMenu(e, menu) {
        var old = document.querySelector('.menu-ctx');
        if (old) old.remove();

        var div = document.createElement('div');
        div.className = 'menu-ctx';
        div.style.cssText = 'position:fixed;z-index:9999;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:4px 0;font-size:12px;min-width:160px;';
        div.style.left = e.clientX + 'px';
        div.style.top = e.clientY + 'px';

        var items = [
            { label: '+ 하위 그룹 추가', icon: '📁', action: function() { addChild(menu, 'G'); } },
            { label: '+ 하위 화면 추가', icon: '📄', action: function() { addChild(menu, 'P'); } },
            { sep: true },
            { label: '+ 같은 레벨에 추가', icon: '➕', action: function() { addSibling(menu); } },
            { sep: true },
            { label: '▲ 위로 이동', action: function() { moveMenu(menu, -1); } },
            { label: '▼ 아래로 이동', action: function() { moveMenu(menu, 1); } },
            { sep: true },
            { label: '삭제', icon: '🗑️', action: function() { listener.button.del.click(); }, danger: true }
        ];

        items.forEach(function(item) {
            if (item.sep) {
                var hr = document.createElement('div');
                hr.style.cssText = 'height:1px;background:#eee;margin:4px 0;';
                div.appendChild(hr);
                return;
            }
            var row = document.createElement('div');
            row.style.cssText = 'padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;' + (item.danger ? 'color:#e53935;' : '');
            row.innerHTML = (item.icon ? '<span>' + item.icon + '</span>' : '') + '<span>' + item.label + '</span>';
            row.onmouseover = function() { row.style.background = '#f0f7ff'; };
            row.onmouseout = function() { row.style.background = ''; };
            row.onclick = function() { div.remove(); item.action(); };
            div.appendChild(row);
        });

        document.body.appendChild(div);
        setTimeout(function() {
            document.addEventListener('click', function handler() { div.remove(); document.removeEventListener('click', handler); });
        }, 0);
    }

    function addChild(parentMenu, type) {
        ctx._isNew = true;
        ctx.selectedMenu = null;
        var maxSort = 0;
        ctx.allMenus.filter(function(m) { return m.PARENT_ID === parentMenu.MENU_ID; }).forEach(function(m) {
            if (m.SORT_ORDER > maxSort) maxSort = m.SORT_ORDER;
        });
        ctx.menuForm.clear();
        ctx.menuForm.setData({
            parent_id: parentMenu.MENU_ID,
            menu_type: type,
            use_yn: 'Y',
            sort_order: maxSort + 1
        });
        ctx.menuForm.setReadonly('menu_id', false);
        ctx.menuForm.focus('menu_id');
        document.getElementById('detail-title-' + S).textContent = (type === 'G' ? '신규 그룹' : '신규 화면') + ' (상위: ' + parentMenu.MENU_NM + ')';
    }

    function addSibling(menu) {
        ctx._isNew = true;
        ctx.selectedMenu = null;
        var siblings = ctx.allMenus.filter(function(m) { return m.PARENT_ID === menu.PARENT_ID; });
        var maxSort = 0;
        siblings.forEach(function(m) { if (m.SORT_ORDER > maxSort) maxSort = m.SORT_ORDER; });
        ctx.menuForm.clear();
        ctx.menuForm.setData({
            parent_id: menu.PARENT_ID || '',
            menu_type: 'P',
            use_yn: 'Y',
            sort_order: maxSort + 1
        });
        ctx.menuForm.setReadonly('menu_id', false);
        ctx.menuForm.focus('menu_id');
        document.getElementById('detail-title-' + S).textContent = '신규 메뉴 (같은 레벨)';
    }

    async function moveMenu(menu, direction) {
        var siblings = ctx.allMenus.filter(function(m) { return m.PARENT_ID === (menu.PARENT_ID || null); });
        siblings.sort(function(a, b) { return (a.SORT_ORDER || 0) - (b.SORT_ORDER || 0); });
        var idx = siblings.findIndex(function(m) { return m.MENU_ID === menu.MENU_ID; });
        var targetIdx = idx + direction;
        if (targetIdx < 0 || targetIdx >= siblings.length) return;

        // 정렬순서 교환
        var mySort = siblings[idx].SORT_ORDER;
        var targetSort = siblings[targetIdx].SORT_ORDER;
        if (mySort === targetSort) targetSort = mySort + direction;

        await platform.post('/api/admin/menus/save', [
            { gstat: 'U', menu_id: siblings[idx].MENU_ID, menu_nm: siblings[idx].MENU_NM, parent_id: siblings[idx].PARENT_ID, menu_type: siblings[idx].MENU_TYPE, pgm_id: siblings[idx].PGM_ID, url: siblings[idx].URL, icon: siblings[idx].ICON, sort_order: targetSort, use_yn: siblings[idx].USE_YN },
            { gstat: 'U', menu_id: siblings[targetIdx].MENU_ID, menu_nm: siblings[targetIdx].MENU_NM, parent_id: siblings[targetIdx].PARENT_ID, menu_type: siblings[targetIdx].MENU_TYPE, pgm_id: siblings[targetIdx].PGM_ID, url: siblings[targetIdx].URL, icon: siblings[targetIdx].ICON, sort_order: mySort, use_yn: siblings[targetIdx].USE_YN }
        ]);
        listener.button.search.click();
    }

    function updateGroupOptions() {
        var opts = [{ value: '', label: '(최상위)' }];
        ctx.allMenus.filter(function(m) { return m.MENU_TYPE === 'G'; }).forEach(function(m) {
            opts.push({ value: m.MENU_ID, label: m.MENU_NM + ' (' + m.MENU_ID + ')' });
        });
        ctx.groupOptions = opts;
        ctx.menuForm.setOptions('parent_id', opts);
    }

    // ═══ 버튼 ═══
    listener.button.search.click = function() {
        platform.post('/api/admin/menus', {}, new Callback(function(r) {
            if (r.resultCode === RESULT_CODE.OK) {
                ctx.allMenus = r.resultData;
                var tree = buildTree(ctx.allMenus);
                renderTree(tree, document.getElementById('menu-tree-' + S));
                updateGroupOptions();
                ctx.menuForm.clear();
                ctx.childGrid.clearData();
                ctx.selectedMenu = null;
                document.getElementById('detail-title-' + S).textContent = '메뉴 상세 (메뉴를 선택하세요)';
            }
        }));
    };

    listener.button.news.click = function() {
        ctx._isNew = true;
        ctx.selectedMenu = null;
        var defaults = { menu_type: 'P', use_yn: 'Y', sort_order: 0 };

        // 현재 선택된 메뉴가 그룹이면 그 아래로
        var sel = document.querySelector('#menu-tree-' + S + ' .menu-tree-item.selected');
        if (sel) {
            var selMenu = ctx.allMenus.find(function(m) { return m.MENU_ID === sel.dataset.menuId; });
            if (selMenu && selMenu.MENU_TYPE === 'G') {
                defaults.parent_id = selMenu.MENU_ID;
            }
        }

        ctx.menuForm.clear();
        ctx.menuForm.setData(defaults);
        ctx.menuForm.setReadonly('menu_id', false);
        ctx.menuForm.focus('menu_id');
        ctx.childGrid.clearData();
        document.getElementById('detail-title-' + S).textContent = '신규 메뉴';

        // 트리 선택 해제
        document.querySelectorAll('#menu-tree-' + S + ' .menu-tree-item').forEach(function(el) { el.classList.remove('selected'); });
    };

    listener.button.save.click = async function() {
        if (!ctx.menuForm.validate()) return;
        var data = ctx.menuForm.getData();
        data.gstat = ctx._isNew ? 'I' : 'U';

        // URL 자동 생성
        if (data.pgm_id && !data.url) {
            data.url = '/pages/screen.html?id=' + data.pgm_id;
        }

        var ok = await FormaPopup.confirm.show('저장하시겠습니까?');
        if (ok) {
            await platform.post('/api/admin/menus/save', [data]);
            FormaPopup.toast.success('저장되었습니다.');
            listener.button.search.click();
        }
    };

    listener.button.del.click = async function() {
        if (!ctx.selectedMenu) { FormaPopup.alert.show('삭제할 메뉴를 선택하세요.'); return; }
        var children = ctx.allMenus.filter(function(c) { return c.PARENT_ID === ctx.selectedMenu.MENU_ID; });
        if (children.length > 0) {
            FormaPopup.alert.show('하위 메뉴가 ' + children.length + '개 있습니다. 하위 메뉴를 먼저 삭제하세요.');
            return;
        }
        var ok = await FormaPopup.confirm.show('\'' + ctx.selectedMenu.MENU_NM + '\' 메뉴를 삭제하시겠습니까?');
        if (ok) {
            await platform.post('/api/admin/menus/delete', [{ menu_id: ctx.selectedMenu.MENU_ID }]);
            FormaPopup.toast.success('삭제되었습니다.');
            listener.button.search.click();
        }
    };

    listener.button.init.click = function() {
        ctx.menuForm.clear();
        ctx.childGrid.clearData();
        ctx.selectedMenu = null;
        ctx._isNew = false;
        document.getElementById('detail-title-' + S).textContent = '메뉴 상세 (메뉴를 선택하세요)';
        document.querySelectorAll('#menu-tree-' + S + ' .menu-tree-item').forEach(function(el) { el.classList.remove('selected'); });
    };

    // 최상위 그룹 추가 버튼
    document.addEventListener('sy010-add-root', function() {
        ctx._isNew = true;
        ctx.selectedMenu = null;
        var maxSort = 0;
        ctx.allMenus.filter(function(m) { return !m.PARENT_ID; }).forEach(function(m) {
            if (m.SORT_ORDER > maxSort) maxSort = m.SORT_ORDER;
        });
        ctx.menuForm.clear();
        ctx.menuForm.setData({ parent_id: '', menu_type: 'G', use_yn: 'Y', sort_order: maxSort + 1 });
        ctx.menuForm.setReadonly('menu_id', false);
        ctx.menuForm.focus('menu_id');
        document.getElementById('detail-title-' + S).textContent = '신규 최상위 그룹';
        document.querySelectorAll('#menu-tree-' + S + ' .menu-tree-item').forEach(function(el) { el.classList.remove('selected'); });
    });

    // 초기 로드
    listener.button.search.click();
    listener.initializedPgm = true;
})();
</script>
</body>
</html>
