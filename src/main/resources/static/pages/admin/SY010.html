<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메뉴관리</title>
    <link rel="stylesheet" href="/assets/css/forma.css">
</head>
<body>
<div class="forma-page">
    <div class="forma-page-header">
        <h1 class="forma-page-title">메뉴관리 (SY010)</h1>
        <div id="toolbar-SY010"></div>
    </div>
    <div class="forma-content">
        <div id="grid-SY010"></div>
    </div>
</div>
<script src="/assets/js/framework/forma.core.js"></script>
<script src="/assets/js/framework/forma.popup.js"></script>
<script src="/assets/js/framework/forma.util.js"></script>
<script src="/assets/js/framework/forma.grid.js"></script>
<script src="/assets/js/framework/forma.form.js"></script>
<script src="/assets/js/framework/forma.toolbar.js"></script>
<script src="/assets/js/framework/forma.tab.js"></script>
<script src="/assets/js/framework/forma.modal.js"></script>
<script>
(async function() {
    var PGM = 'SY010';
    var S = PGM;
    var listener = platform.initListener(PGM);
    var ctx = {};

    // Manual init (no startPage - avoids #forma-toolbar ID conflict in MDI)
    try {
        var res = await platform.get('/api/pgm/' + PGM + '/init');
        if (res.resultCode === 'OK') {
            listener.pgmInfo = res.resultData.pgmInfo;
            listener.pgmAuth = res.resultData.pgmAuth;
        }
    } catch(e) { listener.pgmInfo = {}; listener.pgmAuth = {}; }

    if (typeof FormaToolbar !== 'undefined') {
        FormaToolbar.render('#toolbar-' + S, {
            listener: listener,
            pgmInfo: listener.pgmInfo,
            pgmAuth: listener.pgmAuth
        });
    }

    ctx.grid1 = new FormaGrid('#grid-' + S, {
        editable: true,
        checkable: true,
        rowNum: true,
        columns: [
            { field: 'MENU_ID', label: '메뉴ID', width: 120, editor: 'text' },
            { field: 'MENU_NM', label: '메뉴명', width: 180, editor: 'text' },
            { field: 'PARENT_ID', label: '상위메뉴ID', width: 120, editor: 'text' },
            { field: 'MENU_TYPE', label: '메뉴유형', width: 100, editor: 'select', options: [
                { value: 'G', label: '그룹' },
                { value: 'P', label: '화면' }
            ]},
            { field: 'PGM_ID', label: '프로그램ID', width: 120, editor: 'text' },
            { field: 'URL', label: 'URL', width: 200, editor: 'text' },
            { field: 'ICON', label: '아이콘', width: 100, editor: 'text' },
            { field: 'SORT_ORDER', label: '정렬순서', width: 80, type: 'number', editor: 'text', align: 'center' },
            { field: 'USE_YN', label: '사용', width: 70, editor: 'check', align: 'center' }
        ]
    });

    listener.button.search.click = function() {
        platform.post('/api/admin/menus', {}, new Callback(function(result) {
            if (result.resultCode === RESULT_CODE.OK) ctx.grid1.setData(result.resultData);
        }));
    };

    listener.button.news.click = function() {
        ctx.grid1.addRow({ MENU_TYPE: 'P', USE_YN: 'Y', SORT_ORDER: 0 });
    };

    listener.button.save.click = function() {
        var data = ctx.grid1.getModifiedData();
        if (data.length === 0) { FormaPopup.alert.show('변경된 데이터가 없습니다.'); return; }
        FormaPopup.confirm.show('저장하시겠습니까?').then(function(ok) {
            if (ok) platform.post('/api/admin/menus/save', data, new Callback(function(r) {
                if (r.resultCode === RESULT_CODE.OK) {
                    FormaPopup.toast.success('저장되었습니다.');
                    listener.button.search.click();
                }
            }));
        });
    };

    listener.button.del.click = function() {
        var data = ctx.grid1.getCheckedData();
        if (data.length === 0) { FormaPopup.alert.show('삭제할 항목을 선택하세요.'); return; }
        FormaPopup.confirm.show(data.length + '건 삭제하시겠습니까?').then(function(ok) {
            if (ok) platform.post('/api/admin/menus/delete', data, new Callback(function(r) {
                if (r.resultCode === RESULT_CODE.OK) {
                    FormaPopup.toast.success('삭제되었습니다.');
                    listener.button.search.click();
                }
            }));
        });
    };

    listener.button.init.click = function() {
        ctx.grid1.clearData();
    };

    listener.button.search.click();
    listener.initializedPgm = true;
})();
</script>
</body>
</html>
