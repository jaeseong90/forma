<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메뉴관리</title>
    <link rel="stylesheet" href="/assets/css/forma.css">
</head>
<body>
<div class="forma-page">
    <div class="forma-page-header">
        <h1 class="forma-page-title">메뉴관리 (SY010)</h1>
        <div id="toolbar-SY010"></div>
    </div>
    <div class="forma-content">
        <div id="grid-SY010"></div>
    </div>
</div>
<script src="/assets/js/framework/forma.core.js"></script>
<script src="/assets/js/framework/forma.popup.js"></script>
<script src="/assets/js/framework/forma.util.js"></script>
<script src="/assets/js/framework/forma.grid.js"></script>
<script src="/assets/js/framework/forma.form.js"></script>
<script src="/assets/js/framework/forma.toolbar.js"></script>
<script src="/assets/js/framework/forma.tab.js"></script>
<script src="/assets/js/framework/forma.modal.js"></script>
<script>
(async function() {
    var PGM = 'SY010';
    var S = PGM;
    var listener = platform.initListener(PGM);
    var ctx = {};

    try {
        var res = await platform.get('/api/pgm/' + PGM + '/init');
        if (res.resultCode === 'OK') {
            listener.pgmInfo = res.resultData.pgmInfo;
            listener.pgmAuth = res.resultData.pgmAuth;
        }
    } catch(e) { listener.pgmInfo = {}; listener.pgmAuth = {}; }

    if (typeof FormaToolbar !== 'undefined') {
        FormaToolbar.render('#toolbar-' + S, { listener: listener, pgmInfo: listener.pgmInfo, pgmAuth: listener.pgmAuth });
    }

    ctx.grid1 = new FormaGrid('#grid-' + S, {
        editable: true,
        checkable: true,
        treeField: 'MENU_NM',
        treeIdField: 'MENU_ID',
        treeParentField: 'PARENT_ID',
        columns: [
            { field: 'MENU_ID', label: '메뉴ID', width: 80, editor: 'text' },
            { field: 'MENU_NM', label: '메뉴명', width: 200, editor: 'text', required: true },
            { field: 'PARENT_ID', label: '상위메뉴', width: 80 },
            { field: 'MENU_TYPE', label: '유형', width: 60, editor: 'select', align: 'center',
              options: [{ value: 'G', label: '그룹' }, { value: 'P', label: '화면' }] },
            { field: 'PGM_ID', label: '프로그램ID', width: 100, editor: 'codeHelp',
              nameField: 'PGM_NM',
              popup: {
                  url: '/pages/popup/PGM_P01.html',
                  title: '프로그램 검색',
                  codeField: 'PGM_ID',
                  nameField: 'PGM_NM',
                  width: 600, height: 400
              }
            },
            { field: 'URL', label: 'URL', width: 250, editor: 'text' },
            { field: 'ICON', label: '아이콘', width: 50, editor: 'text', align: 'center' },
            { field: 'SORT_ORDER', label: '정렬', width: 50, editor: 'text', type: 'number', align: 'center' },
            { field: 'USE_YN', label: '사용', width: 50, editor: 'check', align: 'center' }
        ]
    });

    listener.button.search.click = function() {
        platform.post('/api/admin/menus', {}, new Callback(function(r) {
            if (r.resultCode === RESULT_CODE.OK) {
                ctx.grid1.setData(r.resultData);
                if (ctx.grid1.expandAllTree) ctx.grid1.expandAllTree();
            }
        }));
    };

    listener.button.news.click = function() {
        var selected = ctx.grid1.getSelectedItem();
        var defaults = { MENU_TYPE: 'P', USE_YN: 'Y', SORT_ORDER: 0 };
        if (selected && selected.MENU_TYPE === 'G') {
            defaults.PARENT_ID = selected.MENU_ID;
        }
        ctx.grid1.addRow(defaults);
    };

    listener.button.save.click = async function() {
        var data = ctx.grid1.getModifiedData();
        if (!data.length) { FormaPopup.alert.show('변경사항이 없습니다.'); return; }
        if (!ctx.grid1.checkGridValidation()) return;
        data.forEach(function(row) {
            if (row.PGM_ID && (!row.URL || row.URL === '')) {
                row.URL = '/pages/screen.html?id=' + row.PGM_ID;
            }
        });
        var ok = await FormaPopup.confirm.show('저장하시겠습니까?');
        if (ok) {
            await platform.post('/api/admin/menus/save', data);
            FormaPopup.toast.success('저장되었습니다.');
            listener.button.search.click();
        }
    };

    listener.button.del.click = async function() {
        var data = ctx.grid1.getCheckedData();
        if (!data.length) { FormaPopup.alert.show('삭제할 메뉴를 선택하세요.'); return; }
        var ok = await FormaPopup.confirm.show(data.length + '건 삭제하시겠습니까?');
        if (!ok) return;
        await platform.post('/api/admin/menus/delete', data);
        FormaPopup.toast.success('삭제되었습니다.');
        listener.button.search.click();
    };

    listener.button.init.click = function() { ctx.grid1.clearData(); };

    listener.button.search.click();
    listener.initializedPgm = true;
})();
</script>
</body>
</html>
