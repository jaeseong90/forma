<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시스템 관리</title>
    <link rel="stylesheet" href="/assets/css/forma.css">
</head>
<body>
<div class="forma-page">
    <div class="forma-page-header">
        <h1 class="forma-page-title">시스템 관리 (SYS020)</h1>
        <div id="forma-toolbar"></div>
    </div>
    <div class="forma-content">
        <div id="tab-area"></div>

        <!-- 사용자 관리 탭 -->
        <div id="tab-users">
            <div id="user-search"></div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <div id="user-grid" style="flex:2;"></div>
                <div id="user-detail" style="flex:1;min-width:300px;">
                    <div class="forma-section">
                        <div class="forma-section-title">사용자 정보</div>
                        <div id="user-form"></div>
                        <div style="margin-top:8px;">
                            <div class="forma-section-title">역할 할당</div>
                            <div id="user-role-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 역할/권한 관리 탭 -->
        <div id="tab-roles" style="display:none;">
            <div style="display:flex;gap:8px;">
                <div id="role-grid" style="flex:1;"></div>
                <div style="flex:2;min-width:400px;">
                    <div class="forma-section">
                        <div class="forma-section-title">메뉴별 버튼 권한</div>
                        <div id="role-menu-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 메뉴 관리 탭 -->
        <div id="tab-menus" style="display:none;">
            <div id="menu-grid"></div>
        </div>
    </div>
</div>
<script src="/assets/js/framework/forma.core.js"></script>
<script src="/assets/js/framework/forma.popup.js"></script>
<script src="/assets/js/framework/forma.util.js"></script>
<script src="/assets/js/framework/forma.grid.js"></script>
<script src="/assets/js/framework/forma.form.js"></script>
<script src="/assets/js/framework/forma.toolbar.js"></script>
<script src="/assets/js/framework/forma.tab.js"></script>
<script src="/assets/js/framework/forma.modal.js"></script>
<script>
(function() {
    var PGM = 'SYS020';
    var listener = platform.initListener(PGM);
    var ctx = {};

    listener.initPgm = function() {
        ctx.tab = new FormaTab('#tab-area', {
            tabs: [
                { id: 'tab-users', label: '사용자 관리' },
                { id: 'tab-roles', label: '역할/권한 관리' },
                { id: 'tab-menus', label: '메뉴 관리' }
            ],
            listener: listener,
            onTabChange: function(tabId) {
                document.getElementById('tab-users').style.display = tabId === 'tab-users' ? '' : 'none';
                document.getElementById('tab-roles').style.display = tabId === 'tab-roles' ? '' : 'none';
                document.getElementById('tab-menus').style.display = tabId === 'tab-menus' ? '' : 'none';
                if (tabId === 'tab-roles' && !ctx._rolesLoaded) loadRoles();
                if (tabId === 'tab-menus' && !ctx._menusLoaded) loadMenus();
            }
        });

        initUserTab();
        initRoleTab();
        initMenuTab();
        listener.button.search.click();
    };

    // ═══════════════════════════════════════
    //  사용자 관리 탭
    // ═══════════════════════════════════════
    function initUserTab() {
        ctx.userSearch = new FormaForm('#user-search', {
            search: true,
            elements: [
                { field: 'keyword', label: '검색어', widget: 'text', placeholder: 'ID / 이름' },
                { field: 'use_yn', label: '사용여부', widget: 'combo',
                  options: [{ value: '', label: '전체' }, { value: 'Y', label: '사용' }, { value: 'N', label: '미사용' }] }
            ]
        });

        ctx.userGrid = new FormaGrid('#user-grid', {
            sortable: true,
            columns: [
                { field: 'USER_ID', label: '사용자ID', width: 100 },
                { field: 'USER_NM', label: '이름', width: 100 },
                { field: 'DEPT_NAME', label: '부서', width: 120 },
                { field: 'ROLE_CDS', label: '역할', width: 150 },
                { field: 'ADMIN_YN', label: '관리자', width: 60, align: 'center' },
                { field: 'USE_YN', label: '사용', width: 50, align: 'center' }
            ],
            onRowClick: function(row) { onUserClick(row); }
        });

        ctx.userForm = new FormaForm('#user-form', {
            columns: 1, labelWidth: 80,
            elements: [
                { field: 'user_id', label: 'ID', readOnly: true },
                { field: 'user_nm', label: '이름', required: true },
                { field: 'dept_code', label: '부서', widget: 'combo', options: [] },
                { field: 'admin_yn', label: '관리자', widget: 'combo',
                  options: [{ value: 'N', label: 'N' }, { value: 'Y', label: 'Y' }] },
                { field: 'use_yn', label: '사용', widget: 'combo',
                  options: [{ value: 'Y', label: 'Y' }, { value: 'N', label: 'N' }] }
            ]
        });

        // 부서 목록 로드
        platform.get('/api/admin/depts').then(function(res) {
            if (res.resultCode === RESULT_CODE.OK) {
                var opts = [{ value: '', label: '(없음)' }];
                res.resultData.forEach(function(d) {
                    opts.push({ value: d.DEPT_CODE, label: d.DEPT_NAME });
                });
                ctx.userForm.setOptions('dept_code', opts);
            }
        });

        ctx.userRoleGrid = new FormaGrid('#user-role-grid', {
            editable: true, checkable: true,
            columns: [
                { field: 'ROLE_CD', label: '역할코드', width: 100 },
                { field: 'ROLE_NM', label: '역할명', width: 130 },
                { field: 'ASSIGNED', label: '할당', width: 60, editor: 'check', align: 'center' }
            ]
        });
    }

    function loadUsers() {
        var params = ctx.userSearch ? ctx.userSearch.getData() : {};
        platform.post('/api/admin/users', params, new Callback(function(res) {
            if (res.resultCode === RESULT_CODE.OK) ctx.userGrid.setData(res.resultData);
        }));
    }

    function onUserClick(row) {
        ctx.userForm.setData({
            user_id: row.USER_ID, user_nm: row.USER_NM,
            dept_code: row.DEPT_CODE || '', admin_yn: row.ADMIN_YN, use_yn: row.USE_YN
        });
        // 역할 할당 상태 로드
        Promise.all([
            platform.post('/api/admin/roles', {}),
            platform.post('/api/admin/userRoles', { user_id: row.USER_ID })
        ]).then(function(results) {
            var allRoles = results[0].resultData || [];
            var userRoles = results[1].resultData || [];
            var assignedSet = {};
            userRoles.forEach(function(r) { assignedSet[r.ROLE_CD] = true; });
            var data = allRoles.map(function(r) {
                return { ROLE_CD: r.ROLE_CD, ROLE_NM: r.ROLE_NM, ASSIGNED: assignedSet[r.ROLE_CD] ? 'Y' : 'N' };
            });
            ctx.userRoleGrid.setData(data);
        });
    }

    // ═══════════════════════════════════════
    //  역할/권한 관리 탭
    // ═══════════════════════════════════════
    function initRoleTab() {
        ctx.roleGrid = new FormaGrid('#role-grid', {
            editable: true, checkable: true,
            columns: [
                { field: 'ROLE_CD', label: '역할코드', width: 100 },
                { field: 'ROLE_NM', label: '역할명', width: 130, editor: 'text' },
                { field: 'DESCRIPTION', label: '설명', width: 200, editor: 'text' },
                { field: 'USE_YN', label: '사용', width: 50, editor: 'check', align: 'center' }
            ],
            onRowClick: function(row) { loadRoleMenus(row.ROLE_CD); }
        });

        ctx.roleMenuGrid = new FormaGrid('#role-menu-grid', {
            editable: true, checkable: true,
            columns: [
                { field: 'MENU_ID', label: '메뉴ID', width: 70 },
                { field: 'MENU_NM', label: '메뉴명', width: 140 },
                { field: 'SRCH_YN', label: '조회', width: 50, editor: 'check', align: 'center' },
                { field: 'NEW_YN', label: '신규', width: 50, editor: 'check', align: 'center' },
                { field: 'SAVE_YN', label: '저장', width: 50, editor: 'check', align: 'center' },
                { field: 'DEL_YN', label: '삭제', width: 50, editor: 'check', align: 'center' },
                { field: 'PRNT_YN', label: '출력', width: 50, editor: 'check', align: 'center' },
                { field: 'UPLD_YN', label: '업로드', width: 55, editor: 'check', align: 'center' },
                { field: 'INIT_YN', label: '초기화', width: 55, editor: 'check', align: 'center' }
            ]
        });
    }

    function loadRoles() {
        ctx._rolesLoaded = true;
        platform.post('/api/admin/roles', {}, new Callback(function(res) {
            if (res.resultCode === RESULT_CODE.OK) ctx.roleGrid.setData(res.resultData);
        }));
    }

    function loadRoleMenus(roleCd) {
        ctx._selectedRole = roleCd;
        platform.post('/api/admin/roleMenus', { role_cd: roleCd }, new Callback(function(res) {
            if (res.resultCode === RESULT_CODE.OK) ctx.roleMenuGrid.setData(res.resultData);
        }));
    }

    // ═══════════════════════════════════════
    //  메뉴 관리 탭
    // ═══════════════════════════════════════
    function initMenuTab() {
        ctx.menuGrid = new FormaGrid('#menu-grid', {
            editable: true, checkable: true, rowNum: true,
            columns: [
                { field: 'MENU_ID', label: '메뉴ID', width: 80, editor: 'text' },
                { field: 'MENU_NM', label: '메뉴명', width: 150, editor: 'text' },
                { field: 'PARENT_ID', label: '상위메뉴ID', width: 90, editor: 'text' },
                { field: 'MENU_TYPE', label: '유형', width: 60, editor: 'select', align: 'center',
                  options: [{ value: 'G', label: '그룹' }, { value: 'P', label: '화면' }] },
                { field: 'PGM_ID', label: '프로그램ID', width: 90, editor: 'text' },
                { field: 'URL', label: 'URL', width: 250, editor: 'text' },
                { field: 'ICON', label: '아이콘', width: 60, editor: 'text', align: 'center' },
                { field: 'SORT_ORDER', label: '정렬', width: 50, editor: 'text', type: 'number', align: 'center' },
                { field: 'USE_YN', label: '사용', width: 50, editor: 'check', align: 'center' }
            ]
        });
    }

    function loadMenus() {
        ctx._menusLoaded = true;
        platform.post('/api/admin/menus', {}, new Callback(function(res) {
            if (res.resultCode === RESULT_CODE.OK) ctx.menuGrid.setData(res.resultData);
        }));
    }

    // ═══════════════════════════════════════
    //  버튼 이벤트
    // ═══════════════════════════════════════
    listener.button.search.click = function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        if (activeTab === 'tab-users') loadUsers();
        else if (activeTab === 'tab-roles') loadRoles();
        else if (activeTab === 'tab-menus') loadMenus();
    };

    listener.button.save.click = async function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        var ok = await FormaPopup.confirm.show('저장하시겠습니까?');
        if (!ok) return;

        if (activeTab === 'tab-users') {
            // 사용자 정보 저장
            var userData = ctx.userForm.getData();
            if (!userData.user_id) { FormaPopup.alert.show('사용자를 선택하세요.'); return; }
            await platform.post('/api/admin/users/save', [Object.assign(userData, { gstat: 'U' })]);
            // 역할 저장
            var roleData = ctx.userRoleGrid.getData();
            var assignedRoles = roleData.filter(function(r) { return r.ASSIGNED === 'Y'; }).map(function(r) { return r.ROLE_CD; });
            await platform.post('/api/admin/userRoles/save', { user_id: userData.user_id, roles: assignedRoles });
            FormaPopup.toast.success('저장되었습니다.');
            loadUsers();
        } else if (activeTab === 'tab-roles') {
            // 역할 저장
            var modified = ctx.roleGrid.getModifiedData();
            if (modified.length > 0) {
                await platform.post('/api/admin/roles/save', modified);
            }
            // 메뉴 권한 저장
            if (ctx._selectedRole) {
                var menuData = ctx.roleMenuGrid.getModifiedData();
                if (menuData.length > 0) {
                    menuData.forEach(function(m) { m.role_cd = ctx._selectedRole; });
                    await platform.post('/api/admin/roleMenus/save', menuData);
                }
            }
            FormaPopup.toast.success('저장되었습니다.');
            loadRoles();
        } else if (activeTab === 'tab-menus') {
            var menuModified = ctx.menuGrid.getModifiedData();
            if (menuModified.length === 0) { FormaPopup.alert.show('변경 사항이 없습니다.'); return; }
            await platform.post('/api/admin/menus/save', menuModified);
            FormaPopup.toast.success('저장되었습니다.');
            loadMenus();
        }
    };

    listener.button.news.click = function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        if (activeTab === 'tab-users') {
            ctx.userForm.clear();
            ctx.userForm.setReadonly('user_id', false);
            ctx.userRoleGrid.clearData();
            // 신규 모드 표시
            ctx._isNewUser = true;
        } else if (activeTab === 'tab-roles') {
            ctx.roleGrid.addRow({ USE_YN: 'Y' });
        } else if (activeTab === 'tab-menus') {
            ctx.menuGrid.addRow({ MENU_TYPE: 'P', USE_YN: 'Y', SORT_ORDER: 0 });
        }
    };

    listener.button.del.click = async function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        if (activeTab === 'tab-menus') {
            var checked = ctx.menuGrid.getCheckedData();
            if (checked.length === 0) { FormaPopup.alert.show('삭제할 메뉴를 선택하세요.'); return; }
            var ok = await FormaPopup.confirm.show(checked.length + '건 삭제하시겠습니까?');
            if (ok) {
                await platform.post('/api/admin/menus/delete', checked);
                FormaPopup.toast.success('삭제되었습니다.');
                loadMenus();
            }
        }
    };

    listener.button.init.click = function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        if (activeTab === 'tab-users') {
            ctx.userSearch.clear();
            ctx.userGrid.clearData();
            ctx.userForm.clear();
            ctx.userRoleGrid.clearData();
        } else if (activeTab === 'tab-roles') {
            ctx.roleGrid.clearData();
            ctx.roleMenuGrid.clearData();
            ctx._rolesLoaded = false;
        } else if (activeTab === 'tab-menus') {
            ctx.menuGrid.clearData();
            ctx._menusLoaded = false;
        }
    };

    // 신규 사용자 저장 처리
    var origSave = listener.button.save.click;
    listener.button.save.click = async function() {
        var activeTab = ctx.tab ? ctx.tab.getActiveTab() : 'tab-users';
        if (activeTab === 'tab-users' && ctx._isNewUser) {
            var userData = ctx.userForm.getData();
            if (!userData.user_id || !userData.user_nm) {
                FormaPopup.alert.show('ID와 이름을 입력하세요.');
                return;
            }
            var ok = await FormaPopup.confirm.show('신규 사용자를 등록하시겠습니까?');
            if (!ok) return;
            await platform.post('/api/admin/users/save', [Object.assign(userData, { gstat: 'I', user_pw: '' })]);
            // 역할 저장
            var roleData = ctx.userRoleGrid.getData();
            var assignedRoles = roleData.filter(function(r) { return r.ASSIGNED === 'Y'; }).map(function(r) { return r.ROLE_CD; });
            if (assignedRoles.length > 0) {
                await platform.post('/api/admin/userRoles/save', { user_id: userData.user_id, roles: assignedRoles });
            }
            FormaPopup.toast.success('등록되었습니다.');
            ctx._isNewUser = false;
            ctx.userForm.setReadonly('user_id', true);
            loadUsers();
            return;
        }
        origSave();
    };

    document.addEventListener('DOMContentLoaded', function() { platform.startPage(PGM, listener); });
})();
</script>
</body>
</html>
