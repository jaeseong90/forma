server:
  port: 8080

spring:
  profiles:
    active: local
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2

forma:
  primary:
    datasource:
      jdbc-url: jdbc:h2:mem:forma;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password:
    mapper:
      directory: classpath:mapper/**/*.xml
  jwt:
    secret: ${FORMA_JWT_SECRET:formaDefaultSecretKeyForDevelopmentOnly1234567890abcdef}
    valid-seconds: 86400

logging:
  level:
    com.forma: DEBUG
