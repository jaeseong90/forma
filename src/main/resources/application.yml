server:
  port: 8081

spring:
  profiles:
    active: local
  sql:
    init:
      mode: always
      schema-locations: classpath:schema/01-tables.sql
      data-locations: classpath:schema/02-codes.sql,classpath:schema/03-samples.sql,classpath:schema/04-pgm.sql
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

forma:
  file:
    upload-path: ./uploads
  primary:
    datasource:
      jdbc-url: jdbc:h2:mem:forma;DB_CLOSE_DELAY=-1;MODE=MySQL
      driver-class-name: org.h2.Driver
      username: sa
      password:
    mapper:
      directory: classpath:mapper/**/*.xml
  jwt:
    secret: ${FORMA_JWT_SECRET:formaDefaultSecretKeyForDevelopmentOnly1234567890abcdef}
    valid-seconds: 86400

logging:
  level:
    com.forma: DEBUG
