# ============================================================
# FORMA 설계서 YAML 스키마 가이드
# PL이 직접 작성하거나, AI에게 요구사항을 주면 AI가 이 형식으로 생성
# ============================================================

# === 화면 유형 (screen.type) ===
# list           : 검색 + 그리드 (단순 목록 조회)
# master-detail  : 상위 그리드 선택 → 하위 그리드 연동 (전표형)
# form           : 등록/수정 폼
# tab-form       : 탭별 폼 또는 그리드
# tree-grid      : 좌측 트리 + 우측 그리드

# === 위젯 (widget) ===
# text           : 텍스트 입력 (기본)
# number         : 숫자 입력
# combo          : 드롭다운 (code 속성 필수)
# checkbox       : 체크박스
# datepicker     : 날짜 선택
# dateRange      : 시작~종료 날짜 (검색용)
# codePopup      : 돋보기 + 팝업 검색
# textarea       : 여러 줄 텍스트
# radio          : 라디오 버튼
# fileupload     : 파일 첨부

# === 포맷 (format) ===
# currency       : 천단위 콤마 (1,234,500)
# number         : 숫자 포맷
# date           : 날짜 (yyyy-MM-dd)
# badge          : 코드별 색상 라벨 (code 속성 필수)

# === 액션 타입 (actions.type) ===
# SEARCH         : 조회
# SAVE           : 저장
# DELETE         : 삭제
# CUSTOM         : 커스텀 (label, api 필수)
